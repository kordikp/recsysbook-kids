<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAFAF7">
<title>How Recommendations Work — p-book for Kids</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body>

<!-- ONBOARDING (first visit only) -->
<div class="overlay" id="onboarding">
  <div class="onboarding-card">
    <div class="step active" data-step="0">
      <h1>How Recommendations Work</h1>
      <p class="author">Pavel Kordik</p>
      <p class="subtitle">Ever wondered how YouTube knows what you want to watch next? Let's find out! &#127775;</p>
      <button class="btn-primary btn-large" onclick="app.startReading()">Let's go! &#128640;</button>
      <button class="btn-ghost" onclick="app.showStep(1)">Tell me more first</button>
    </div>
    <div class="step" data-step="1">
      <h2>How do you like to learn?</h2>
      <div class="onboard-opts">
        <button class="opt-card" data-voice="explorer" onclick="app.pickVoice(this)">
          <span class="opt-icon">&#128269;</span>
          <span class="opt-label">Show me how things work!</span>
        </button>
        <button class="opt-card" data-voice="creator" onclick="app.pickVoice(this)">
          <span class="opt-icon">&#127912;</span>
          <span class="opt-label">I want to build something!</span>
        </button>
        <button class="opt-card" data-voice="thinker" onclick="app.pickVoice(this)">
          <span class="opt-icon">&#129504;</span>
          <span class="opt-label">I like understanding why things work</span>
        </button>
        <button class="opt-card" data-voice="universal" onclick="app.pickVoice(this)">
          <span class="opt-icon">&#128218;</span>
          <span class="opt-label">Just exploring!</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <div class="search-input-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search the book..." autocomplete="off" oninput="app.onSearch(this.value)">
    </div>
    <button class="btn-ghost" onclick="app.closeSearch()">Cancel</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- TOP BAR -->
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <span class="topbar-title" onclick="app.switchView('home')">p-book for Kids</span>
  </div>
  <button class="topbar-search" onclick="app.openSearch()">
    <span>&#128269;</span>
    <span class="search-placeholder">Search...</span>
  </button>
  <div class="topbar-right">
    <button class="xp-badge" id="xpBadge" onclick="app.switchView('profile')"></button>
    <button class="voice-badge" id="voiceBadge" onclick="app.cycleVoice()"></button>
    <button class="topbar-icon" id="settingsBtn" onclick="app.toggleSettings()">&#9881;</button>
  </div>
</header>

<!-- MAIN VIEWS -->
<main id="appMain">

  <!-- HOME VIEW (Netflix-style) -->
  <div class="view active" id="view-home">
    <div class="home-inner" id="homeContent">
      <!-- Shelves rendered by JS -->
    </div>
  </div>

  <!-- READ VIEW (focused reading) -->
  <div class="view" id="view-read">
    <div class="read-layout">
      <div class="read-pane" id="readPane">
        <!-- Content rendered by JS -->
      </div>
      <!-- Context panel (desktop: right sidebar) -->
      <aside class="context-panel" id="contextPanel">
        <div class="ctx-section" id="ctxMeta"></div>
        <div class="ctx-section" id="ctxNext"></div>
        <div class="ctx-section" id="ctxRelated"></div>
        <div class="ctx-section" id="ctxQuiz"></div>
        <div class="ctx-section" id="ctxChat"></div>
      </aside>
    </div>
  </div>

  <!-- MAP VIEW (big picture) -->
  <div class="view" id="view-map">
    <div class="map-inner" id="mapContent">
      <!-- Chapter map rendered by JS -->
    </div>
  </div>

  <!-- GLOSSARY VIEW -->
  <div class="view" id="view-glossary">
    <div class="glossary-inner" id="glossaryContent"></div>
  </div>

  <!-- PROFILE VIEW -->
  <div class="view" id="view-profile">
    <div class="profile-inner" id="profileContent"></div>
  </div>

  <!-- CHAT VIEW -->
  <div class="view" id="view-chat">
    <div class="chat-view-inner">
      <div class="chat-messages" id="chatMessagesFull">
        <div class="chat-msg bot">Ask about any topic in the book. I'll find relevant sections and suggest a reading path.</div>
      </div>
      <div class="chat-input-wrap">
        <input type="text" id="chatInputFull" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')app.sendFullChat()">
        <button onclick="app.sendFullChat()">&#10148;</button>
      </div>
    </div>
  </div>

</main>

<!-- HIGHLIGHT POPUP (appears on text selection) -->
<div class="highlight-popup" id="highlightPopup" style="display:none">
  <button onclick="app.highlightSelection()" title="Highlight">&#127912;</button>
  <button onclick="app.highlightAndNote()" title="Highlight + Note">&#128221;</button>
</div>

<!-- LINEAR NAV BAR (prev/next through entire book DFS) -->
<div class="linear-nav" id="linearNav" style="display:none">
  <button class="ln-btn" id="lnPrev" onclick="app.linearPrev()">&#9664;</button>
  <div class="ln-info" id="lnInfo" onclick="app.switchView('map')"></div>
  <button class="ln-btn" id="lnNext" onclick="app.linearNext()">&#9654;</button>
</div>

<!-- BOTTOM TAB NAV -->
<nav class="bottom-nav" id="bottomNav">
  <button class="tab active" data-view="home" onclick="app.switchView('home')">
    <span class="tab-icon">&#127968;</span>
    <span class="tab-label">Home</span>
  </button>
  <button class="tab" data-view="read" onclick="app.switchView('read')">
    <span class="tab-icon">&#128214;</span>
    <span class="tab-label">Read</span>
  </button>
  <button class="tab" data-view="map" onclick="app.switchView('map')">
    <span class="tab-icon">&#128506;</span>
    <span class="tab-label">Map</span>
  </button>
  <button class="tab" data-view="glossary" onclick="app.switchView('glossary')">
    <span class="tab-icon">&#128218;</span>
    <span class="tab-label">Topics</span>
  </button>
  <button class="tab" data-view="chat" onclick="app.switchView('chat')">
    <span class="tab-icon">&#128172;</span>
    <span class="tab-label">Ask</span>
  </button>
  <button class="tab" data-view="profile" onclick="app.switchView('profile')">
    <span class="tab-icon">&#128100;</span>
    <span class="tab-label">You</span>
  </button>
</nav>

<!-- XP Toast (slides in from top-right) -->
<div class="xp-toast" id="xpToast"></div>

<!-- SETTINGS PANEL -->
<div class="settings-drawer" id="settingsDrawer">
  <div class="settings-inner">
    <div class="settings-head">
      <h3>Settings</h3>
      <button onclick="app.toggleSettings()">&#10005;</button>
    </div>
    <div class="sg"><label>Theme</label>
      <div class="sg-row">
        <button class="sg-opt active" data-theme="light" onclick="app.setTheme('light')">Light</button>
        <button class="sg-opt" data-theme="dark" onclick="app.setTheme('dark')">Dark</button>
        <button class="sg-opt" data-theme="sepia" onclick="app.setTheme('sepia')">Sepia</button>
      </div>
    </div>
    <div class="sg"><label>Font size</label>
      <div class="sg-row">
        <button class="sg-opt" data-fs="small" onclick="app.setFontSize('small')">S</button>
        <button class="sg-opt active" data-fs="medium" onclick="app.setFontSize('medium')">M</button>
        <button class="sg-opt" data-fs="large" onclick="app.setFontSize('large')">L</button>
      </div>
    </div>
    <div class="sg"><label>Recombee</label>
      <div id="recStatus" class="sg-info">Demo mode</div>
    </div>
    <div class="sg"><label>Reset</label>
      <button class="btn-ghost" onclick="app.resetAll()">Clear all data &amp; start fresh</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js?v=13"></script>
</body>
</html>
